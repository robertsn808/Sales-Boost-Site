name = "mojo-luna-955c"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist/public"

[[d1_databases]]
binding = "DB"
database_name = "savvy-admin"
database_id = "1bbb0cdc-f9c3-4043-baad-48f9a7caa16e"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "techsavvy-assets"

# Environment variables to set in Cloudflare Dashboard:
# SESSION_SECRET    - Admin password / auth secret
# ANTHROPIC_API_KEY - For AI chat features
# MCP_API_KEY       - API key for MCP server access (falls back to SESSION_SECRET if not set)
# R2_PUBLIC_URL     - Public URL for the R2 bucket (defaults to https://assets.techsavvyhawaii.com)
